name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m py_compile improve.py voice/improve_voice.py voice/eval_voice.py voice/make_voice.py
      # Offline test suite — no network, no API key.
      - run: python -m pytest tests/ -q
      - run: python improve.py --help

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # macroquad's Linux build needs ALSA/udev + X11/GL dev headers.
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libx11-dev libxi-dev libgl1-mesa-dev pkg-config
      - run: cargo build --release --manifest-path plot/Cargo.toml
